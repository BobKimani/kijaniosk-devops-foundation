ansible_user: ubuntu
ansible_ssh_private_key_file: "~/.ssh/kijani-gcp"

app_base_dir: /opt/kijanikiosk
app_config_dir: /opt/kijanikiosk/config
app_log_dir: /var/log/kijanikiosk
app_data_dir: /var/lib/kijanikiosk

common_packages:
  - curl
  - ufw
  - logrotate

service_accounts:
  - kk-api
  - kk-payments
  - kk-logs

journal_persistent: true

logrotate_retention: 7
logrotate_rotate: 14